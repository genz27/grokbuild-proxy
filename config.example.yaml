listen: "127.0.0.1:8080"
allow_public_listen: false
data_dir: "./data"
api_key: ""
admin_key: ""
upstream:
  base_url: "https://cli-chat-proxy.grok.com/v1"
  client_version: "0.2.93"
  client_identifier: "grok-pager"
  user_agent: "grok-pager/0.2.93 grok-shell/0.2.93 (linux; x86_64)"
  token_auth: "xai-grok-cli"
oauth:
  issuer: "https://auth.x.ai"
  client_id: "b1a00492-073a-47ea-816f-4c329264a828"
  scope: "openid profile email offline_access grok-cli:access api:access"
  callback_addr: "127.0.0.1:56122"
chat_backend: "responses"
anthropic:
  enabled: true
  model_aliases:
    claude-sonnet-4: grok-4.5
    claude-sonnet-4-0: grok-4.5
    claude-sonnet-4-20250514: grok-4.5
    claude-sonnet-4-5: grok-4.5
    claude-sonnet-4-5-20250929: grok-4.5
    claude-sonnet-4-6: grok-4.5
    claude-sonnet-5: grok-4.5
    claude-3-5-sonnet-latest: grok-4.5
    claude-3-5-sonnet-20241022: grok-4.5
    claude-3-5-sonnet-20240620: grok-4.5
    claude-3-7-sonnet-latest: grok-4.5
    claude-3-7-sonnet-20250219: grok-4.5
    claude-3-sonnet-20240229: grok-4.5
    claude-opus-4: grok-4.5
    claude-opus-4-0: grok-4.5
    claude-opus-4-1: grok-4.5
    claude-opus-4-1-20250805: grok-4.5
    claude-opus-4-5: grok-4.5
    claude-opus-4-5-20251101: grok-4.5
    claude-opus-4-6: grok-4.5
    claude-opus-4-7: grok-4.5
    claude-opus-4-8: grok-4.5
    claude-opus-4-20250514: grok-4.5
    claude-3-opus-latest: grok-4.5
    claude-3-opus-20240229: grok-4.5
    claude-haiku-4: grok-4.5
    claude-haiku-4-5: grok-4.5
    claude-haiku-4-5-20251001: grok-4.5
    claude-3-5-haiku-latest: grok-4.5
    claude-3-5-haiku-20241022: grok-4.5
    claude-3-haiku-20240307: grok-4.5
    sonnet: grok-4.5
    opus: grok-4.5
    haiku: grok-4.5
    claude-fable-5: grok-4.5
    fable-5: grok-4.5
  passthrough_prefixes: ["grok-"]
  # Unknown beta extensions are dropped; recognized thinking/effort is mapped.
  strip_unknown_betas: true
  count_tokens: true
  # Auto-compact long Claude Code / OpenAI sessions before they hit model limits.
  # Soft threshold triggers compact; hard max rejects after compact fails.
  # Keep under upstream 500k prompt limit with headroom for tools/system.
  auto_compact: true
  soft_input_tokens: 300000
  # Local safety budget; leaves room for translation/tokenizer differences
  # before the upstream 500k hard limit.
  max_input_tokens: 360000
  max_tool_result_chars: 120000
  keep_recent_messages: 16
  preserve_cache_hints: true
lb:
  strategy: "priority_rr"
  sticky_ttl_sec: 3600
  refresh_skew_sec: 180
  # Walk past free-exhausted accounts before returning 429 to the client.
  max_attempts: 32
  cooldown:
    base_sec: 300
    max_sec: 3600
    # Free-tier quota is a rolling ~24h window; cool long enough to skip burned accounts.
    free_usage_exhausted_sec: 72000
  # Background access-token pre-refresh (reduces first-token latency).
  prefetch:
    enabled: true
    interval_sec: 30
    max_per_tick: 128
    concurrency: 16
  # Temporarily deprioritize accounts after 429; cleared on success.
  soft_demote_on_429: true
# 默认出站路由。Admin 运行时设置会覆盖这里的值。
# mode: environment | direct | url
proxy:
  mode: environment
  url: ""
# 可选的 SSO -> OIDC 转换服务。未启用时 JSON 凭证导入仍可使用。
sso_converter:
  enabled: false
  endpoint: "http://sso-import:8090"
  api_key: ""
  # 明文 HTTP 仅用于 loopback 或受信任的容器私网地址。
  allow_insecure_http: true
  # 单次 sidecar 请求范围为 1-300 秒。
  timeout_sec: 300
  # 不得超过 sidecar 的 100 条硬上限。
  max_batch: 50
# 自动巡检默认关闭；401 会刷新并复查，429/网络错误不会隔离。
inspection:
  enabled: false
  interval_sec: 3600
  initial_delay_sec: 30
  timeout_sec: 30
  concurrency: 2
  confirm_unauthorized: 2
  # 0 表示永不自动物理删除隔离凭证。
  purge_after_sec: 0
  mass_failure_minimum: 3
  mass_failure_ratio: 0.5
  skip_recent_success_sec: 900
  # 每轮最多处理固定数量，避免大量同时过期凭证造成文件存储写放大；跨轮轮转。
  max_credentials_per_run: 100
# 批量导入任务边界。
import:
  max_files: 100
  max_file_bytes: 4194304
  max_total_bytes: 16777216
  max_entries: 1000
  max_queued_jobs: 32
  max_queued_bytes: 67108864
  max_retained_jobs: 128
  max_retained_bytes: 67108864
  job_ttl_min: 30
limits:
  max_body_bytes: 20971520
  request_timeout_sec: 600
  max_concurrent: 2048
logging:
  level: info

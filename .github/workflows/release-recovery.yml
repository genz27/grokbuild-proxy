name: Release Recovery

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to recover
        required: true
        type: string

concurrency:
  group: release-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recover:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1
        with:
          cosign-release: v2.5.2
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Validate tag and immutable images
        env:
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "$TAG" | grep -Eq '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          test "$(git describe --tags --exact-match HEAD)" = "$TAG"

          version="${TAG#v}"
          revision="$(git rev-parse HEAD)"
          repository="${REPOSITORY,,}"
          proxy="ghcr.io/${repository}:${version}"
          sidecar="ghcr.io/${repository}-sso-import:${version}"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT

          validate_manifest() {
            local ref="$1"
            local output="$2"
            docker buildx imagetools inspect --format '{{json .}}' "$ref" > "$output"
            jq -e --arg revision "$revision" --arg version "$version" '
              . as $root |
              ([.manifest.manifests[] | select(.platform.os != "unknown") |
                "\(.platform.os)/\(.platform.architecture)"] |
                sort == ["linux/amd64", "linux/arm64"]) and
              (["linux/amd64", "linux/arm64"] | all(. as $platform |
                (($root.image[$platform].config.Labels // $root.image[$platform].config.labels // {}) |
                  .["org.opencontainers.image.revision"] == $revision and
                  .["org.opencontainers.image.version"] == $version)))
            ' "$output" >/dev/null
          }

          validate_manifest "$proxy" "$work/proxy.json"
          validate_manifest "$sidecar" "$work/sidecar.json"
      - name: Build archives, checksums, and SBOMs
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean --skip=publish
      - name: Verify and sign release payload
        env:
          REQUIRE_SBOM: "1"
        run: |
          set -euo pipefail
          sh scripts/verify-release-archive.sh dist
          cosign sign-blob --yes \
            --bundle dist/checksums.txt.sigstore.json \
            dist/checksums.txt
      - name: Upload signed recovery assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-assets-${{ inputs.tag }}
          retention-days: 1
          if-no-files-found: error
          path: |
            dist/grokbuild-proxy_*.tar.gz
            dist/grokbuild-proxy_*.zip
            dist/*.sbom.json
            dist/checksums.txt
            dist/checksums.txt.sigstore.json
      - name: Publish GitHub Release and promote moving image tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          version="${TAG#v}"
          revision="$(git rev-parse HEAD)"
          repository="${REPOSITORY,,}"
          proxy="ghcr.io/${repository}"
          sidecar="ghcr.io/${repository}-sso-import"
          mapfile -t assets < <(awk '{ print "dist/" $2 }' dist/checksums.txt)
          assets+=(dist/checksums.txt dist/checksums.txt.sigstore.json)
          test "${#assets[@]}" -eq 14

          notes="docs/release-notes-${TAG}.md"
          test -f "$notes"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${assets[@]}" --clobber
          else
            gh release create "$TAG" "${assets[@]}" \
              --verify-tag --target "$revision" --title "$TAG" --notes-file "$notes"
          fi

          release_json="$(mktemp)"
          gh release view "$TAG" --json isDraft,tagName,assets > "$release_json"
          test "$(jq -r '.tagName' "$release_json")" = "$TAG"
          test "$(jq -r '.isDraft' "$release_json")" = false
          test "$(jq '.assets | length' "$release_json")" -eq 14

          case "$version" in
            *-*) exit 0 ;;
          esac
          major="${version%%.*}"
          remainder="${version#*.}"
          minor="${remainder%%.*}"
          current="v${version}"
          stable_re='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'
          latest_global="$(git tag --list 'v*' --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"
          latest_major="$(git tag --list "v${major}.*" --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"
          latest_minor="$(git tag --list "v${major}.${minor}.*" --sort=-v:refname | grep -E "$stable_re" | head -n 1 || true)"

          aliases=""
          if [ "$current" = "$latest_minor" ]; then aliases="$aliases ${major}.${minor}"; fi
          if [ "$current" = "$latest_major" ]; then aliases="$aliases ${major}"; fi
          if [ "$current" = "$latest_global" ]; then aliases="$aliases latest"; fi
          for alias in $aliases; do
            docker buildx imagetools create --tag "${proxy}:${alias}" "${proxy}:${version}"
            docker buildx imagetools create --tag "${sidecar}:${alias}" "${sidecar}:${version}"
            docker buildx imagetools inspect "${proxy}:${alias}" >/dev/null
            docker buildx imagetools inspect "${sidecar}:${alias}" >/dev/null
          done
